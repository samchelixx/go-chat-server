version: "3.9"

services:

  # ── PostgreSQL database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       chatdb
      POSTGRES_USER:     chatuser
      POSTGRES_PASSWORD: chatpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go Chat Server ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT:              "8080"
      DATABASE_URL:      "postgres://chatuser:chatpass@postgres:5432/chatdb?sslmode=disable"
      JWT_SECRET:        "change_this_in_production_please"
      JWT_EXPIRES_HOURS: "72"
      GIN_MODE:          "release"
    depends_on:
      postgres:
        condition: service_healthy   # wait for the DB to be ready before starting

volumes:
  pgdata:    # named volume persists database data across container restarts
